<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Photo gallery of Amsterdam apartment">
  <meta name="theme-color" content="#f5f3f0">
  <title>Gallery | Amsterdam Home Exchange</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <a href="#main" class="skip-to-content">Skip to main content</a>

  <!-- NAVIGATION -->
  <nav class="navbar">
    <div class="nav-container">
      <div class="logo">
        <a href="index.html">🏠 Amsterdam</a>
      </div>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <ul class="nav-menu" id="navMenu">
        <li><a href="index.html">Home</a></li>
        <li><a href="gallery.html" class="active">Gallery</a></li>
        <li><a href="neighborhood.html">Neighborhood</a></li>
        <li><a href="exchange.html">Exchange</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </div>
  </nav>

  <!-- PAGE HEADER -->
  <section class="page-header">
    <div class="container">
      <h1>Photo Gallery</h1>
      <p>Explore every detail of the apartment</p>
    </div>
  </section>

  <!-- MAIN CONTENT -->
  <main id="main">

    <!-- GALLERY SECTION -->
    <section class="gallery-section">
      <div class="container">
        <div class="gallery" id="gallery">
          <p style="grid-column: 1 / -1; text-align: center; padding: 2rem; color: #8b8378;">Loading photos...</p>
        </div>
      </div>
    </section>

    <!-- LIGHTBOX MODAL -->
    <div id="lightbox" class="lightbox">
      <div class="lightbox-content">
        <button class="lightbox-close" aria-label="Close gallery">&times;</button>
        <button class="lightbox-nav lightbox-prev" aria-label="Previous photo">&#10094;</button>
        <img id="lightbox-img" src="" alt="">
        <button class="lightbox-nav lightbox-next" aria-label="Next photo">&#10095;</button>
        <div class="lightbox-counter"></div>
      </div>
    </div>

  </main>

  <!-- FOOTER -->
  <footer>
    <div class="footer-content">
      <p>&copy; 2025 Amsterdam Home Exchange. A privacy-conscious home exchange platform.</p>
    </div>
  </footer>

  <script src="script.js"></script>
  <script src="gallery-loader.js"></script>
</body>
</html>
